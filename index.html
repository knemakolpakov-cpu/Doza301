<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doza301</title>
<style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b1320;color:white;-webkit-user-select:none;}
    
    /* Верхняя шапка */
    .header{text-align:center;padding:15px;background:#0f1b2e;font-size:24px;font-weight:bold;border-bottom:1px solid #1e2d45;}
    
    /* Логотип (сделан крупнее) */
    .logo{display:flex;justify-content:center;margin:20px 0;}
    .logo img{width:80%;max-width:300px;height:auto;}
    
    /* Подзаголовок */
    .subtitle{text-align:center;font-size:20px;color:#cbd5e1;margin-bottom:20px;font-weight:500;}

    .container{padding:10px 20px 30px 20px;}
    .panel{background:#111a2b;padding:25px;border-radius:18px;box-shadow:0 6px 20px rgba(0,0,0,0.6);}
    
    /* Увеличенные подписи полей */
    label{display:block;font-size:16px;color:#94a3b8;margin-bottom:8px;padding-left:5px;text-transform:uppercase;letter-spacing:1px;}
    
    /* Увеличенные поля ввода */
    input{width:100%;padding:18px;margin-bottom:20px;border:none;border-radius:12px;background:#1b2740;color:white;font-size:24px;font-weight:bold;box-sizing:border-box;outline:none;border:1px solid #2c3e5a;}
    input:focus{border-color:#4da3ff;background:#233150;}
    
    /* Крупная кнопка */
    button.main-btn{width:100%;padding:22px;background:#0066cc;border:none;border-radius:15px;font-size:22px;color:white;cursor:pointer;font-weight:bold;margin-top:10px;box-shadow: 0 5px 0 #004a99;text-transform:uppercase;}
    button.main-btn:active{transform:translateY(3px);box-shadow:none;}
    
    /* Блок результатов */
    .result-box{margin-top:25px;background:#0f1c30;padding:20px;border-radius:12px;font-size:18px;line-height:1.8;display:none;border:1px solid #1e2d45;}
    .check-point{color:#4da3ff; border-top: 1px solid #1e2d45; margin-top:15px; padding-top:15px;}

    /* Карточки уставок (цифры еще больше) */
    .setpoints-grid{display:flex;gap:15px;margin-top:20px;display:none;}
    .sp-card{flex:1;background:#1b2740;padding:20px 5px;border-radius:15px;text-align:center;border:1px solid #2c3e5a;}
    .sp-label{display:block;font-size:12px;color:#94a3b8;margin-bottom:10px;text-transform:uppercase;font-weight:bold;}
    .sp-value{display:block;font-size:36px;font-weight:bold;}

    .footer{text-align:center;margin-top:40px;font-size:13px;color:#64748b;line-height:1.6;}
</style>
</head>
<body>

<div class="header">Doza301</div>

<div class="logo"><img src="logo.png" alt="logo"></div>

<div class="subtitle">Расчет ввода уставки</div>

<div class="container">
    <div class="panel">
        <label>Прокачано (тонны):</label>
        <input id="pumped" type="number" inputmode="decimal" placeholder="6000">
        
        <label>План на сутки (тонны):</label>
        <input id="plan" type="number" inputmode="decimal" placeholder="8709">
        
        <label>Текущее время (ЧЧ:ММ):</label>
        <input id="current_time" type="text" placeholder="08:00">

        <label>Заполнение контейнера (%):</label>
        <input id="percent" type="number" inputmode="decimal" placeholder="25">

        <button class="main-btn" onclick="calculate()">ВЫПОЛНИТЬ РАСЧЕТ</button>

        <div id="result_text" class="result-box"></div>

        <div id="result_grid" class="setpoints-grid">
            <div class="sp-card" id="card_mass">
                <span class="sp-label">Уставка (МАССА)</span>
                <span class="sp-value" id="res_mass" style="color:#4da3ff">-</span>
            </div>
            <div class="sp-card" id="card_time">
                <span class="sp-label">Уставка (ВРЕМЯ)</span>
                <span class="sp-value" id="res_time" style="color:#ffca28">-</span>
            </div>
        </div>
    </div>

    <div class="footer">
        Разработчики и тех. поддержка:<br>
        А.Н. Колпаков | С.А. Скоробогатов
    </div>
</div>

<script>
    function calculate() {
        const pumpedStr = document.getElementById('pumped').value;
        const planStr = document.getElementById('plan').value;
        const tVal = document.getElementById('current_time').value;
        const percStr = document.getElementById('percent').value;

        if (percStr === "" || isNaN(parseFloat(percStr))) {
            alert("Введите процент заполнения!");
            return;
        }
        
        let perc = parseFloat(percStr);
        let emptyPerc = 100 - perc;
        
        if (emptyPerc <= 0) { alert("Контейнер полон!"); return; }

        let timeCalculated = false;
        let massCalculated = false;
        let statusText = "Осталось заполнить: <b>" + emptyPerc.toFixed(1) + " %</b><br>";
        let checkPointText = "";

        // РАСЧЕТ ПО ВРЕМЕНИ (Формула: X = (Остаток часов * 100) / Остаток %)
        if (tVal.includes(':')) {
            let parts = tVal.split(':');
            let h = parseFloat(parts[0]);
            let m = parseFloat(parts[1]);
            if (h < 24 && m < 60) {
                let passedHours = h + m / 60;
                let hoursLeft = 24 - passedHours;
                
                let setTime = (hoursLeft * 100) / emptyPerc;
                document.getElementById('res_time').innerText = setTime.toFixed(1);

                // Контрольные точки (на базе 4 кг)
                let targetPerc = (passedHours / 24) * 100;
                let targetKg = (4 * targetPerc) / 100;

                checkPointText = "<div class='check-point'>" +
                    "На текущее время должно быть:<br>" +
                    "Процент: <b>" + targetPerc.toFixed(1) + " %</b><br>" +
                    "Масса: <b>" + targetKg.toFixed(3) + " кг.</b></div>";

                statusText += "До 00:00 осталось: <b>" + hoursLeft.toFixed(1) + " ч.</b>";
                timeCalculated = true;
            }
        }

        // РАСЧЕТ ПО МАССЕ
        if (pumpedStr !== "" && planStr !== "") {
            let pumped = parseFloat(pumpedStr);
            let plan = parseFloat(planStr);
            let setMass = (plan - pumped) / (emptyPerc / 100);
            document.getElementById('res_mass').innerText = Math.round(setMass);
            massCalculated = true;
        }

        if (!timeCalculated && !massCalculated) {
            alert("Введите время или тонны!");
            return;
        }

        document.getElementById('result_text').style.display = 'block';
        document.getElementById('result_grid').style.display = 'flex';
        document.getElementById('result_text').innerHTML = statusText + checkPointText;
        
        document.getElementById('card_mass').style.opacity = massCalculated ? "1" : "0.3";
        document.getElementById('card_time').style.opacity = timeCalculated ? "1" : "0.3";
        
        // Автопрокрутка к результатам
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
